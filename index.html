<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Колесо подарков</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .main-bg {
      background: radial-gradient(circle at 50% 30%, #1e1b4b 0%, #0f172a 60%, #020617 100%);
    }
    .wheel-container-glow {
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 60%);
    }
  </style>
</head>
<body class="text-slate-100 flex flex-col h-[100dvh] main-bg overflow-hidden">
  <!-- Top Bar -->
  <header class="flex justify-between items-center p-4 z-10 shrink-0 relative">
    <div class="flex items-center gap-3">
      <div id="user-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xl shadow-[0_0_15px_rgba(99,102,241,0.3)] border border-white/10">
        🧑‍🚀
      </div>
      <div>
        <div id="user-name" class="font-bold text-sm leading-tight text-white" data-i18n="app.player">Player 1</div>
        <div class="text-[10px] tracking-widest text-indigo-400 font-bold uppercase mt-0.5" data-i18n="app.status">Игрок</div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <!-- Tickets Balance Pill -->
      <div class="flex items-center gap-1.5 bg-white/10 backdrop-blur-md px-3 py-1.5 rounded-2xl border border-white/10 shadow-inner">
        <span class="text-sm drop-shadow-md">🎟️</span>
        <span id="ticket-balance" class="font-bold text-white text-sm min-w-[12px] text-center">0</span>
      </div>
      <button id="btn-settings" class="w-9 h-9 flex items-center justify-center rounded-2xl bg-white/5 hover:bg-white/10 transition backdrop-blur-md border border-white/10 text-slate-300">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 relative w-full max-w-md mx-auto min-h-0 overflow-hidden">
    
    <!-- VIEW: GAME -->
    <div id="view-game" class="tab-view active w-full h-full overflow-y-auto flex flex-col items-center justify-between px-4 pb-6 pt-2 relative">
      
      <!-- Glowing background behind wheel -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[180vw] h-[100vw] max-w-[800px] wheel-container-glow pointer-events-none z-0"></div>

      <!-- Title -->
      <div class="text-center z-10 shrink-0 mt-4">
        <h1 class="text-[32px] leading-tight font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-indigo-200 drop-shadow-md tracking-tight" data-i18n="app.title">Колесо подарков</h1>
        <p class="text-[13px] text-indigo-300/80 font-bold mt-1 tracking-widest uppercase" data-i18n="app.taskSubTitle">Испытай удачу</p>
      </div>

      <!-- Wheel Container -->
      <div class="relative w-[300px] h-[300px] sm:w-[340px] sm:h-[340px] shrink-0 z-10 my-8 mx-auto">
        <!-- Outer Animated Rim -->
        <div class="absolute inset-[-16px] rounded-full bg-gradient-to-br from-slate-800 to-[#020617] shadow-[0_15px_35px_rgba(0,0,0,0.8)] border border-slate-700/50 flex items-center justify-center">
          <div class="absolute inset-[6px] rounded-full border-[4px] border-dashed border-indigo-400/30 animate-spin" style="animation-duration: 30s;"></div>
        </div>

        <!-- Pointer (Golden Pin) -->
        <div class="absolute -top-7 left-1/2 -translate-x-1/2 z-30 drop-shadow-[0_6px_10px_rgba(0,0,0,0.7)] pointer-events-none">
          <svg width="46" height="58" viewBox="0 0 32 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 44L0 16C0 7.16344 7.16344 0 16 0C24.8366 0 32 7.16344 32 16L16 44Z" fill="url(#pointer_gradient)"/>
            <path d="M16 41L3 16.5C3 9.3203 8.8203 3.5 16 3.5C23.1797 3.5 29 9.3203 29 16.5L16 41Z" fill="url(#pointer_inner)"/>
            <circle cx="16" cy="14" r="5" fill="#FFFFFF" fill-opacity="0.9" />
            <defs>
              <linearGradient id="pointer_gradient" x1="16" y1="0" x2="16" y2="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FDE047"/>
                <stop offset="1" stop-color="#B45309"/>
              </linearGradient>
              <linearGradient id="pointer_inner" x1="16" y1="3.5" x2="16" y2="41" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FEF08A"/>
                <stop offset="1" stop-color="#D97706"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        
        <!-- The Wheel Outer Ring -->
        <div class="w-full h-full rounded-full p-1.5 bg-gradient-to-b from-white/10 to-transparent backdrop-blur-md border border-white/10 shadow-[inset_0_0_20px_rgba(255,255,255,0.05)] relative z-20">
          
          <!-- Inner Wheel Border -->
          <div class="w-full h-full rounded-full shadow-[inset_0_10px_20px_rgba(0,0,0,0.8)] relative overflow-hidden bg-slate-900 border-[3px] border-slate-900 transition-colors duration-500" id="wheel-wrapper">
            <!-- Rotating Wheel -->
            <div id="wheel" class="w-full h-full rounded-full transition-transform duration-[4000ms] ease-[cubic-bezier(0.15,0.8,0.1,1)] relative">
              <div id="wheel-content" class="relative w-full h-full"></div>
            </div>
            
            <!-- Wheel Center Hub -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 rounded-full bg-gradient-to-br from-slate-700 to-slate-900 border-[3px] border-slate-600 shadow-[0_8px_20px_rgba(0,0,0,0.8)] z-50 flex items-center justify-center">
              <div class="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-400 to-indigo-600 shadow-[0_0_15px_rgba(99,102,241,0.8)] border border-indigo-300/50"></div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Spin Button -->
      <div class="w-full z-10 shrink-0 mt-auto px-4 pb-2">
        <button id="btn-spin" class="w-full relative group overflow-hidden rounded-[24px] bg-gradient-to-b from-indigo-400 to-indigo-700 p-[3px] shadow-[0_10px_40px_rgba(99,102,241,0.5)] transition-all active:scale-[0.97] disabled:opacity-50 disabled:pointer-events-none disabled:grayscale">
          <div class="bg-gradient-to-b from-indigo-500 to-indigo-800 rounded-[21px] px-2 py-[18px] h-full flex items-center justify-center gap-2 border border-indigo-400/30 relative z-10 shadow-[inset_0_2px_10px_rgba(255,255,255,0.2)]">
            <span class="font-black text-white text-[18px] tracking-wide drop-shadow-md" id="spin-text">КРУТИТЬ КОЛЕСО</span>
            <div class="bg-indigo-950/50 rounded-lg px-3 py-1.5 flex items-center gap-1.5 border border-indigo-400/30 shadow-inner">
              <span id="spin-cost-amount" class="text-white font-bold text-[15px] leading-none">1</span>
              <span class="text-[15px] leading-none drop-shadow-sm">🎟️</span>
            </div>
          </div>
          <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700 z-20"></div>
        </button>
      </div>
    </div>

    <!-- VIEW: TASKS -->
    <div id="view-tasks" class="tab-view hidden w-full h-full overflow-y-auto px-4 py-6">
      <h2 class="text-[28px] font-black tracking-tight mb-1 text-white" data-i18n="app.tasksTitle">Задания</h2>
      <p class="text-[13px] text-indigo-300/80 mb-6 font-medium" data-i18n="app.taskSubTitle">Выполняйте задания и получайте спины!</p>
      <div id="tasks-list" class="flex flex-col gap-1"></div>
    </div>

    <!-- VIEW: PRIZES -->
    <div id="view-prizes" class="tab-view hidden w-full h-full overflow-y-auto px-4 py-6">
      <div class="flex items-end justify-between mb-6">
        <h2 class="text-[28px] font-black tracking-tight text-white leading-none" data-i18n="app.prizesTitle">Все призы</h2>
        <button class="text-[13px] font-bold text-indigo-400 hover:text-indigo-300 transition-colors flex items-center gap-0.5 mb-0.5" onclick="document.querySelector('[data-target=\'view-inventory\']').click()">
          <span data-i18n="app.tabInv">Инвентарь</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
        </button>
      </div>
      <div id="prizes-grid" class="grid grid-cols-3 gap-3"></div>
    </div>

    <!-- VIEW: INVENTORY -->
    <div id="view-inventory" class="tab-view hidden w-full h-full overflow-y-auto px-4 py-6">
      <div class="flex items-end justify-between mb-6">
        <h2 class="text-[28px] font-black tracking-tight text-white leading-none" data-i18n="app.invTitle">Ваш инвентарь</h2>
      </div>
      <div id="inventory-grid" class="grid grid-cols-3 gap-3"></div>
      <div id="empty-inv" class="hidden flex-col items-center justify-center py-20 text-slate-500">
        <span class="text-6xl mb-4 opacity-50 drop-shadow-md">🎒</span>
        <p class="font-medium" data-i18n="app.emptyInv">Инвентарь пока пуст</p>
      </div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="shrink-0 flex justify-around items-center bg-[#0f172a]/90 backdrop-blur-xl border-t border-white/5 pt-2 px-2 z-20 relative" style="padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));">
    <button class="nav-btn flex flex-col items-center p-2 text-indigo-400 transition-colors" data-target="view-game">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span class="text-[10px] font-bold tracking-wide" data-i18n="app.tabGame">Игра</span>
    </button>
    <button class="nav-btn flex flex-col items-center p-2 text-slate-500 hover:text-indigo-300 transition-colors" data-target="view-tasks">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
      <span class="text-[10px] font-bold tracking-wide" data-i18n="app.tabTasks">Задания</span>
    </button>
    <button class="nav-btn flex flex-col items-center p-2 text-slate-500 hover:text-indigo-300 transition-colors" data-target="view-prizes">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"></path></svg>
      <span class="text-[10px] font-bold tracking-wide" data-i18n="app.tabPrizes">Призы</span>
    </button>
    <button class="nav-btn flex flex-col items-center p-2 text-slate-500 hover:text-indigo-300 transition-colors" data-target="view-inventory">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      <span class="text-[10px] font-bold tracking-wide" data-i18n="app.tabInv">Инвентарь</span>
    </button>
  </nav>

  <!-- MODALS -->
  <div id="modals-container" class="fixed inset-0 z-50 pointer-events-none flex items-center justify-center p-4">
    <!-- Settings Modal -->
    <div id="modal-settings" class="modal-overlay absolute inset-0 opacity-0 transition-opacity duration-300 hidden pointer-events-auto flex items-center justify-center p-4">
      <div class="bg-slate-900 rounded-[28px] p-6 w-full max-w-sm border border-slate-700/50 shadow-2xl transform scale-95 transition-transform duration-300" id="modal-settings-content">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-bold" data-i18n="app.settingsTitle">Настройки</h3>
          <button class="close-modal w-8 h-8 flex justify-center items-center bg-slate-800 rounded-full text-slate-400 hover:bg-slate-700 hover:text-white transition">✕</button>
        </div>
        
        <div class="glass-panel rounded-2xl p-4 mb-6">
          <p class="text-sm font-medium text-indigo-200 mb-3" id="referrals-text">Приглашено: 0</p>
          <button id="btn-invite" class="w-full py-2.5 bg-indigo-500/20 text-indigo-300 rounded-xl font-bold border border-indigo-500/30 hover:bg-indigo-500/30 transition active:scale-[0.98]">
            <span data-i18n="app.inviteBtn">Пригласить друга (демо)</span>
          </button>
        </div>

        <h4 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-3" data-i18n="app.skinsTitle">Скины барабана</h4>
        <div id="skins-list" class="space-y-2 max-h-[40vh] overflow-y-auto pr-2"></div>
      </div>
    </div>

    <!-- Generic Alert -->
    <div id="modal-alert" class="modal-overlay absolute inset-0 opacity-0 transition-opacity duration-300 hidden pointer-events-auto flex items-center justify-center p-4">
      <div class="bg-slate-900 rounded-[28px] p-6 w-full max-w-sm border border-indigo-500/30 shadow-[0_0_40px_rgba(99,102,241,0.2)] text-center transform scale-95 transition-transform duration-300" id="modal-alert-content">
        <div id="alert-emoji" class="text-6xl mb-4 animate-bounce drop-shadow-lg flex justify-center">💬</div>
        <h3 id="alert-title" class="text-xl font-black mb-2 text-white">Уведомление</h3>
        <p id="alert-text" class="text-slate-300 mb-6 text-sm font-medium">Текст</p>
        <button class="close-modal w-full py-3.5 bg-gradient-to-r from-indigo-500 to-indigo-600 rounded-2xl font-black text-white hover:opacity-90 transition active:scale-[0.98] shadow-lg shadow-indigo-500/30" data-i18n="app.awesome">Отлично!</button>
      </div>
    </div>
  </div>

  <!-- PREMIUM TELEGRAM REVEAL MODAL -->
  <div id="modal-reveal" class="fixed inset-0 z-[100] hidden flex-col items-center justify-center bg-slate-950/95 backdrop-blur-2xl transition-opacity duration-500 opacity-0 pointer-events-none overflow-hidden">
    <div id="reveal-rays" class="tg-rays opacity-0 transition-opacity duration-1000"></div>
    <div id="reveal-flash" class="absolute inset-0 pointer-events-none z-10"></div>
    <div id="reveal-content" class="relative z-20 flex flex-col items-center justify-center transform scale-90 transition-transform duration-500 w-full px-4">
      <div id="reveal-glow" class="absolute w-64 h-64 bg-gradient-to-r from-indigo-500 to-fuchsia-500 rounded-full blur-[80px] opacity-0 transition-opacity duration-1000"></div>
      <div id="reveal-emoji-wrapper" class="relative w-56 h-56 flex items-center justify-center mb-8 z-30 perspective-1000">
        <div id="reveal-emoji" class="flex justify-center items-center"></div>
      </div>
      <div id="reveal-info" class="opacity-0 flex flex-col items-center translate-y-8 transition-all duration-700 w-full max-w-xs z-30">
        <h3 id="reveal-title" class="text-[32px] font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-indigo-200 mb-2 drop-shadow-md text-center">Ура!</h3>
        <p id="reveal-text" class="text-indigo-200/90 text-[15px] mb-8 font-bold text-center drop-shadow-md uppercase tracking-wide">Вы выиграли приз</p>
        <button id="btn-claim-prize" class="w-full py-4 bg-white text-indigo-900 rounded-[20px] font-black text-[17px] shadow-[0_0_40px_rgba(255,255,255,0.3)] hover:scale-105 active:scale-95 transition-all">
          <span data-i18n="app.awesome">Отлично!</span>
        </button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
  </html>
